<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <title>문제 선택 | BOOONG</title>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link rel="stylesheet" href="css/select.css">
</head>
<body>
    <div class="sel-wrap">
        <header class="sel-header">
            <a class="back-btn" href="index.html">← 대시보드</a>
            <div class="sel-header__accent"></div>
            <h1 class="sel-header__title">인쇄할 문제 선택</h1>
            <p class="sel-header__sub">목록에서 원하는 문제를 선택한 뒤 하단 버튼을 누르세요.</p>
        </header>

        <div class="sel-toolbar">
            <input type="text" id="search" class="sel-search" placeholder="문제 번호로 검색…" autocomplete="off">
            <div class="sel-toolbar__btns">
                <button class="sel-btn-minor" id="btn-select-all">전체 선택</button>
                <button class="sel-btn-minor" id="btn-deselect-all">전체 해제</button>
            </div>
        </div>

        <div class="sel-meta">
            <label class="sel-meta__label" for="header-input">인쇄물 헤더 (선택)</label>
            <input type="text" id="header-input" class="sel-text-input"
                placeholder="예: 2026학년도 잠원고등학교 정치와 법 연습문제">
        </div>

        <div id="key-list" class="sel-list">
            <div class="sel-loading">목록을 불러오는 중…</div>
        </div>
    </div>

    <div class="sel-bar">
        <span class="sel-bar__count" id="sel-count">0개 선택됨</span>
        <button class="sel-bar__btn" id="btn-print" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
            </svg>
            인쇄하기
        </button>
    </div>

    <script src="js/select.js"></script>
</body>
</html>
