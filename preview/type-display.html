<!DOCTYPE html>
<html lang="ko">
<head>

<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>

  body { background: #fff; padding: 24px 28px; }
  .specimen { display: flex; flex-direction: column; gap: 4px; }

  .meta span { color: #5A6372; font-weight: 600; }
  .sub { font-family: 'Black Han Sans', sans-serif; font-size: 28px; font-weight: 400; color: #111418; letter-spacing: -0.02em; margin-top: 12px; }
</style>
</head>
<body>
<div class="specimen">
  <div class="display">사회교육공동체 BOOONG</div>
  <div class="sub">합리적 차별은 일단 여기서는 금지입니다</div>
  <div class="meta"><span>Black Han Sans</span> · 400 (inherently heavy) · Display only · Korean + Latin</div>
</div>
</body>
</html>
