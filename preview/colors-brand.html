<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 8px; overflow: hidden; border: 1px solid #E3E7EE; }
  .swatch__color { height: 72px; }
  .swatch__info { padding: 8px 10px; background: #fff; }
  .swatch__name { font-size: 11px; font-weight: 700; color: #111418; }
  .swatch__hex  { font-size: 10px; color: #5A6372; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .swatch__role { font-size: 9px; color: #9AA3B2; margin-top: 1px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch__color" style="background:#1B6BFF;"></div>
    <div class="swatch__info">
      <div class="swatch__name">Brand</div>
      <div class="swatch__hex">#1B6BFF</div>
      <div class="swatch__role">Primary — buttons, links, badges</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch__color" style="background:#0F4FCC;"></div>
    <div class="swatch__info">
      <div class="swatch__name">Brand Deep</div>
      <div class="swatch__hex">#0F4FCC</div>
      <div class="swatch__role">Hover / pressed state</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch__color" style="background:#E6EEFF;"></div>
    <div class="swatch__info">
      <div class="swatch__name">Brand Soft</div>
      <div class="swatch__hex">#E6EEFF</div>
      <div class="swatch__role">Tinted bg, hover fill</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch__color" style="background:#0A2E7A;"></div>
    <div class="swatch__info">
      <div class="swatch__name">Brand Ink</div>
      <div class="swatch__hex">#0A2E7A</div>
      <div class="swatch__role">Dark blue text on light</div>
    </div>
  </div>
</div>
</body>
</html>
