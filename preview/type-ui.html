<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 20px 24px; font-family: 'Pretendard', -apple-system, sans-serif; color: #111418; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 1px; }
  .sample { line-height: 1.3; }
  .label { font-size: 10px; color: #9AA3B2; font-weight: 600; letter-spacing: 0.04em; }
  .divider { border: none; border-top: 1px solid #E3E7EE; }
  .badge { display: inline-block; background: #1B6BFF; color: #fff; font-size: 12px; font-weight: 800; padding: 3px 9px; border-radius: 6px; letter-spacing: 0.04em; }
  .tag { font-size: 11px; font-weight: 600; color: #1B6BFF; text-transform: uppercase; letter-spacing: 0.05em; }
  .kbd-demo { display: flex; gap: 6px; align-items: center; font-size: 12px; color: #5A6372; }
  kbd { display: inline-block; padding: 2px 6px; background: #fff; border: 1px solid #CFD6E2; border-radius: 4px; font-family: 'Pretendard', sans-serif; font-size: 11px; font-weight: 600; box-shadow: 0 1px 0 #CFD6E2; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="sample" style="font-size:32px;font-weight:800;letter-spacing:-0.02em;">섹션 제목</div><div class="label">H2 · 32px · 800</div></div>
    <div class="item"><div class="sample" style="font-size:22px;font-weight:800;letter-spacing:-0.01em;">소제목</div><div class="label">H3 · 22px · 800</div></div>
    <div class="item"><div class="sample" style="font-size:17px;font-weight:800;">카드 제목</div><div class="label">H4 · 17px · 800</div></div>
  </div>
  <hr class="divider">
  <div class="row">
    <div class="item"><span class="badge">1-2</span><div class="label" style="margin-top:4px;">Section badge</div></div>
    <div class="item"><span class="tag">고등학교</span><div class="label" style="margin-top:4px;">Category tag</div></div>
    <div class="item">
      <div class="kbd-demo"><kbd>←</kbd><kbd>→</kbd> 섹션 이동 &nbsp; <kbd>Space</kbd> 답 열기</div>
      <div class="label" style="margin-top:4px;">Keyboard hints</div>
    </div>
  </div>
  <div style="font-size:10px;color:#9AA3B2;font-weight:600;">Pretendard Variable · All UI chrome, headings, labels</div>
</body>
</html>
