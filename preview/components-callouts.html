<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 16px 18px; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; gap: 10px; }
  .callout { border-radius: 12px; padding: 14px 18px; border-left: 4px solid; }
  .callout__label { font-size: 12px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.01em; }
  .callout__body { font-family: 'Gowun Batang', serif; font-size: 14px; line-height: 1.7; }
  .case  { background: #EAF5EE; border-left-color: #2E7D4F; color: #16402A; }
  .question { background: #E6EEFF; border-left-color: #1B6BFF; color: #0A2E7A; font-size: 15px; }
  .concept  { background: #F4F6FA; border-left-color: #5A6372; color: #111418; }
  .answer { border: 1px solid #E3E7EE; border-radius: 8px; overflow: hidden; background: #EAF2FF; border-color: #1B6BFF; }
  .answer__toggle { width: 100%; padding: 10px 14px; text-align: left; font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700; color: #0F4FCC; background: transparent; border: none; cursor: pointer; display: flex; justify-content: space-between; }
  .answer__content { padding: 8px 14px 12px; border-top: 1px solid rgba(27,107,255,0.2); font-family: 'Gowun Batang', serif; font-size: 13px; line-height: 1.65; color: #111418; }
</style>
</head>
<body>
  <div class="callout case">
    <div class="callout__label">사례</div>
    <div class="callout__body">A씨는 식당에서 고용주에게 장애를 이유로 채용을 거부당했습니다. 이것은 불합리한 차별에 해당합니다.</div>
  </div>
  <div class="callout question">
    <div class="callout__label">발문</div>
    <div class="callout__body" style="font-family:'Pretendard',sans-serif; font-size:15px;">이 사례에서 차별의 기준이 된 요소는 무엇인가요?</div>
  </div>
  <div class="callout concept">
    <div class="callout__label">개념</div>
    <div class="callout__body">차별금지: 합리적 이유 없이 특정 집단에 불이익을 주는 행위를 법적으로 금지하는 원칙</div>
  </div>
  <div class="answer">
    <div class="answer__toggle">모범 답안 보기 <span>▲</span></div>
    <div class="answer__content">장애는 직무 수행과 무관한 특성으로, 이를 채용 거부의 기준으로 삼는 것은 합리적 이유가 없습니다.</div>
  </div>
</body>
</html>
