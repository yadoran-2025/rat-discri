<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 20px 24px; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field__label { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #1B6BFF; }
  .field__label--muted { color: #5A6372; }
  input, textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #CFD6E2; border-radius: 8px; font-family: inherit; font-size: 15px; color: #111418; background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .focused { border-color: #1B6BFF; box-shadow: 0 0 0 3px rgba(27,107,255,0.12); }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="field">
      <div class="field__label">수업 코드</div>
      <input type="text" placeholder="ABC-123" class="focused">
    </div>
    <div class="field">
      <div class="field__label field__label--muted">이름 (선택)</div>
      <input type="text" placeholder="홍길동">
    </div>
  </div>
  <div class="field">
    <div class="field__label">답변 작성</div>
    <textarea rows="3" placeholder="여기에 답변을 작성하세요…" style="resize:none;line-height:1.6;"></textarea>
  </div>
</body>
</html>
