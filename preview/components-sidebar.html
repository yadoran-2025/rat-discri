<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F9FC; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
  .sidebar { width: 220px; background: #F7F9FC; border-right: 1px solid #E3E7EE; padding: 18px 14px; height: 280px; display: flex; flex-direction: column; gap: 0; }
  .sidebar__group { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: #1B6BFF; text-transform: uppercase; margin-bottom: 4px; }
  .sidebar__title { font-size: 16px; font-weight: 800; color: #111418; line-height: 1.2; margin-bottom: 2px; }
  .sidebar__subtitle { font-size: 11px; color: #5A6372; margin-bottom: 14px; }
  .nav-item { display: block; padding: 8px 10px; border-radius: 8px; font-size: 12px; color: #111418; margin-bottom: 2px; transition: background 0.15s; cursor: pointer; }
  .nav-item:hover { background: #E6EEFF; color: #0A2E7A; }
  .nav-item.active { background: #1B6BFF; color: #fff; font-weight: 700; }
  .nav-id { font-family: 'Pretendard', sans-serif; font-weight: 800; margin-right: 6px; opacity: 0.85; }
  .hotkeys { margin-top: auto; padding-top: 12px; border-top: 1px solid #E3E7EE; font-size: 10px; color: #9AA3B2; line-height: 2; }
  kbd { display: inline-block; padding: 1px 5px; background: #fff; border: 1px solid #CFD6E2; border-radius: 4px; font-size: 9px; font-weight: 600; box-shadow: 0 1px 0 #CFD6E2; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar__group">법</div>
  <div class="sidebar__title">합리적 차별</div>
  <div class="sidebar__subtitle">1차시: 차별금지 영역</div>
  <nav>
    <div class="nav-item"><span class="nav-id">1-1</span>편견과 차별의 정의</div>
    <div class="nav-item active"><span class="nav-id">1-2</span>차별금지가 적용되는 영역</div>
    <div class="nav-item"><span class="nav-id">1-3</span>사례 탐구</div>
    <div class="nav-item"><span class="nav-id">1-4</span>정리 및 토론</div>
  </nav>
  <div class="hotkeys">
    <div><kbd>←</kbd> <kbd>→</kbd> 섹션 이동</div>
    <div><kbd>Space</kbd> 답 열기/닫기</div>
  </div>
</div>
</body>
</html>
