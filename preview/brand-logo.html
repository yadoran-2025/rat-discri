<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 28px 32px; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .logo-row { display: flex; align-items: center; gap: 20px; }
  .scooter { animation: ride 6s ease-in-out infinite alternate; display: block; }
  @keyframes ride {
    0%   { transform: translateX(12px) rotate(-2deg); }
    50%  { transform: translateX(0px)  rotate(-1deg); }
    100% { transform: translateX(-12px) rotate(-2deg); }
  }
  .wordmark { font-family: 'Black Han Sans', sans-serif; font-size: 40px; font-weight: 400; color: #0A2E7A; letter-spacing: -0.02em; line-height: 1; }
  .wordmark span { color: #1B6BFF; }
  .subtitle { font-family: 'Pretendard', sans-serif; font-size: 13px; color: #5A6372; letter-spacing: 0.04em; }
  .pill { border: 1px solid rgba(207,214,226,0.9); border-radius: 999px; background: rgba(255,255,255,0.8); color: #0F4FCC; padding: 5px 12px; font-size: 11px; font-weight: 900; letter-spacing: 0.08em; backdrop-filter: blur(6px); }
  .divider { width: 1px; height: 40px; background: #E3E7EE; }
</style>
</head>
<body>
  <div class="logo-row">
    <svg class="scooter" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#1B6BFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="18" r="2.5"></circle>
      <circle cx="18" cy="18" r="2.5"></circle>
      <path d="M6 15.5V11l2-2h3.5l1.5 1.5v5"></path>
      <path d="M10 9V5h3"></path>
    </svg>
    <div class="wordmark">사회교육공동체 <span>BOOONG</span></div>
  </div>
  <div class="subtitle">사회교육플랫폼 · 수업용 프리젠터 · 실시간 피드백</div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="pill">ABOUT US</div>
    <div class="divider"></div>
    <div class="pill">시스템 가이드</div>
  </div>
</body>
</html>
