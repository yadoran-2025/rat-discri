<body>
  <p class="body-text">편견이란 특정 집단에 대해 충분한 근거 없이 형성된 부정적 태도를 말합니다. <strong>차별</strong>은 이러한 편견이 구체적인 행동으로 나타나는 것입니다.</p>
  <p class="italic">"타자를 돕고, 타자로서 돕고, 타자를 돕는 일을 도우며…" — 『사이보그가 되다』</p>
