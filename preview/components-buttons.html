<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 20px; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn { padding: 10px 20px; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: background 0.15s; }
  .btn-primary { background: #1B6BFF; color: #fff; }
  .btn-primary:hover { background: #0F4FCC; }
  .btn-secondary { background: #fff; color: #111418; border: 1px solid #CFD6E2; }
  .btn-secondary:hover { background: #E6EEFF; border-color: #1B6BFF; color: #0A2E7A; }
  .btn-ghost { background: transparent; color: #1B6BFF; border: none; padding: 10px 14px; }
  .btn-ghost:hover { background: #E6EEFF; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 6px; }
  .btn-danger { background: #fff; color: #dc2626; border: 1px solid #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-disabled { background: #1B6BFF; color: #fff; opacity: 0.4; cursor: not-allowed; }
  .guide-link { display: block; padding: 9px 14px; background: #1B6BFF; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; text-align: center; width: 140px; }
  .label { font-size: 10px; color: #9AA3B2; font-weight: 600; margin-top: 4px; text-align: center; }
  .item { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><button class="btn btn-primary">수업 시작</button><div class="label">Primary</div></div>
    <div class="item"><button class="btn btn-secondary">이전 섹션</button><div class="label">Secondary</div></div>
    <div class="item"><button class="btn btn-ghost">지도안 열기</button><div class="label">Ghost</div></div>
    <div class="item"><button class="btn btn-danger">삭제</button><div class="label">Danger</div></div>
    <div class="item"><button class="btn btn-disabled" disabled>비활성</button><div class="label">Disabled</div></div>
  </div>
  <div class="row">
    <div class="item"><button class="btn btn-primary btn-sm">다음 차시 →</button><div class="label">Small</div></div>
    <div class="item"><a class="guide-link">지도안 열기</a><div class="label">Sidebar link</div></div>
  </div>
</body>
</html>
