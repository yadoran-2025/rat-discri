<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top right, #f0f7ff, #ffffff); padding: 18px; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .dash-card { background: rgba(255,255,255,0.86); backdrop-filter: blur(6px); border: 1px solid rgba(207,214,226,0.75); border-radius: 12px; padding: 20px; flex: 1; min-width: 180px; max-width: 240px; text-decoration: none; color: inherit; box-shadow: 0 3px 14px rgba(17,20,24,0.04); position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.23,1,0.32,1); }
  .dash-card::after { content:""; position:absolute; top:0; left:0; width:100%; height:4px; background:#1B6BFF; opacity:0; transition: opacity 0.3s; }
  .dash-card:hover { transform: translateY(-4px); background: #fff; box-shadow: 0 10px 24px rgba(17,20,24,0.08); }
  .dash-card:hover::after { opacity: 1; }
  .dash-card__tag { font-size: 11px; font-weight: 600; color: #1B6BFF; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .dash-card__title { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .dash-card__desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 16px; }
  .dash-card__footer { display: flex; align-items: center; font-weight: 600; font-size: 13px; color: #1B6BFF; gap: 3px; }
  .dash-card--game { background: rgba(255,247,237,0.72); }
  .stack { position: relative; }
  .stack::before { content:""; position:absolute; bottom:-4px; left:8px; right:8px; height:100%; background: rgba(255,255,255,0.55); border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; z-index:-1; }
</style>
</head>
<body>
  <div class="stack">
    <div class="dash-card">
      <div class="dash-card__tag">고등학교</div>
      <div class="dash-card__title">합리적 차별은 일단 여기서는 금지입니다</div>
      <div class="dash-card__desc">차별의 정의와 판단 기준을 연습하는 수업입니다.</div>
      <div class="dash-card__footer">2개 차시 <span>↓</span></div>
    </div>
  </div>
  <div class="dash-card dash-card--game">
    <div class="dash-card__tag">게임</div>
    <div class="dash-card__title">빨간벽돌집짓기</div>
    <div class="dash-card__desc">박찬정 선생님의 게임 진행을 위한 웹사이트.</div>
    <div class="dash-card__footer">게임 열기 <span>→</span></div>
  </div>
  <div class="dash-card" style="background:rgba(0,0,0,0.02);">
    <div class="dash-card__tag">도구</div>
    <div class="dash-card__title">수업 JSON 빌더</div>
    <div class="dash-card__desc">폼으로 섹션·블록 구성 후 JSON 자동 생성.</div>
    <div class="dash-card__footer">이동하기 <span>→</span></div>
  </div>
</body>
</html>
